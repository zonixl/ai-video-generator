services:
  backend:
    image: ai-content-pipeline-backend:cpu
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    env_file:
      - path: .env
        required: false
    environment:
      HF_HOME: /app/cache/huggingface
      TRANSFORMERS_CACHE: /app/cache/huggingface
      SENTENCE_TRANSFORMERS_HOME: /opt/sentence-transformers
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-0}
    ports:
      - "8000:8000"
    volumes:
      - ./config/config.yaml:/app/config/config.yaml:ro
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - ./data:/app/data
      - hf-cache:/app/cache/huggingface
    restart: unless-stopped

  frontend:
    image: ai-content-pipeline-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  hf-cache:
